<svg viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif" font-size="13">
  <title>FB Campaign Creation Flow</title>

  <rect width="900" height="1100" fill="#f8f9fa"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- UPLOAD CREATIVE -->
  <rect x="300" y="20" width="300" height="44" rx="22" fill="#4a90d9"/>
  <text x="450" y="47" text-anchor="middle" fill="white" font-weight="600" font-size="14">📁 Upload Creative</text>

  <line x1="450" y1="64" x2="450" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CREATIVE LIBRARY -->
  <rect x="280" y="90" width="340" height="44" rx="8" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="450" y="117" text-anchor="middle" fill="#1a1a2e" font-weight="600">🖼 Thư viện Creative</text>

  <line x1="450" y1="134" x2="450" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CHỌN CR -->
  <rect x="280" y="160" width="340" height="44" rx="8" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="450" y="182" text-anchor="middle" fill="#1a1a2e" font-weight="600">✅ Chọn CR → Mở cửa sổ lên camp</text>
  <text x="450" y="197" text-anchor="middle" fill="#888" font-size="11">(multi-select)</text>

  <line x1="450" y1="204" x2="450" y2="230" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CAMPAIGN WINDOW -->
  <rect x="30" y="230" width="840" height="560" rx="12" fill="white" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="256" text-anchor="middle" fill="#aaa" font-size="11" font-style="italic">— Cửa sổ lên Campaign —</text>

  <!-- Template APP -->
  <rect x="50" y="265" width="240" height="200" rx="8" fill="#f0f7ff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="170" y="288" text-anchor="middle" fill="#4a90d9" font-weight="700" font-size="13">📱 Template: APP</text>
  <line x1="50" y1="294" x2="290" y2="294" stroke="#4a90d9" stroke-width="1"/>
  <text x="65" y="315" fill="#333" font-size="12">• Package name</text>
  <text x="65" y="334" fill="#333" font-size="12">• App ID / Developer ID</text>
  <text x="65" y="353" fill="#333" font-size="12">• Pages (chạy app)</text>
  <rect x="65" y="375" width="90" height="26" rx="5" fill="#4a90d9"/>
  <text x="110" y="392" text-anchor="middle" fill="white" font-size="11">Chọn có sẵn</text>
  <rect x="165" y="375" width="90" height="26" rx="5" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="210" y="392" text-anchor="middle" fill="#4a90d9" font-size="11">Tạo mới + Lưu</text>

  <!-- Template TARGET -->
  <rect x="330" y="265" width="240" height="200" rx="8" fill="#fff8f0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="450" y="288" text-anchor="middle" fill="#f5a623" font-weight="700" font-size="13">🎯 Template: TARGET</text>
  <line x1="330" y1="294" x2="570" y2="294" stroke="#f5a623" stroke-width="1"/>
  <text x="345" y="315" fill="#333" font-size="12">• Country</text>
  <text x="345" y="334" fill="#333" font-size="12">• Gender / Age / Language</text>
  <text x="345" y="353" fill="#333" font-size="12">• Budget: CBO / ABO</text>
  <rect x="345" y="375" width="90" height="26" rx="5" fill="#f5a623"/>
  <text x="390" y="392" text-anchor="middle" fill="white" font-size="11">Chọn có sẵn</text>
  <rect x="445" y="375" width="90" height="26" rx="5" fill="white" stroke="#f5a623" stroke-width="1.5"/>
  <text x="490" y="392" text-anchor="middle" fill="#f5a623" font-size="11">Tạo mới + Lưu</text>

  <!-- Template AD -->
  <rect x="610" y="265" width="240" height="200" rx="8" fill="#f0fff4" stroke="#27ae60" stroke-width="1.5"/>
  <text x="730" y="288" text-anchor="middle" fill="#27ae60" font-weight="700" font-size="13">📝 Template: AD</text>
  <line x1="610" y1="294" x2="850" y2="294" stroke="#27ae60" stroke-width="1"/>
  <text x="625" y="315" fill="#333" font-size="12">• Headlines</text>
  <text x="625" y="334" fill="#333" font-size="12">• Primary text</text>
  <text x="625" y="353" fill="#333" font-size="12">• Số lượng CR / Ad</text>
  <rect x="625" y="375" width="90" height="26" rx="5" fill="#27ae60"/>
  <text x="670" y="392" text-anchor="middle" fill="white" font-size="11">Chọn có sẵn</text>
  <rect x="725" y="375" width="90" height="26" rx="5" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="770" y="392" text-anchor="middle" fill="#27ae60" font-size="11">Tạo mới + Lưu</text>

  <!-- PACKAGE -->
  <rect x="160" y="490" width="580" height="100" rx="8" fill="#fdf4ff" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="450" y="513" text-anchor="middle" fill="#9b59b6" font-weight="700" font-size="13">📦 Package</text>
  <line x1="160" y1="519" x2="740" y2="519" stroke="#9b59b6" stroke-width="1"/>
  <text x="450" y="542" text-anchor="middle" fill="#333" font-size="12">Tổ hợp APP + TARGET + AD template đi chung với nhau</text>
  <rect x="260" y="557" width="100" height="26" rx="5" fill="#9b59b6"/>
  <text x="310" y="574" text-anchor="middle" fill="white" font-size="11">Chọn có sẵn</text>
  <rect x="375" y="557" width="150" height="26" rx="5" fill="white" stroke="#9b59b6" stroke-width="1.5"/>
  <text x="450" y="574" text-anchor="middle" fill="#9b59b6" font-size="11">Tạo package mới + Lưu</text>

  <!-- arrows to package -->
  <line x1="170" y1="465" x2="250" y2="490" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="450" y1="465" x2="450" y2="490" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="730" y1="465" x2="650" y2="490" stroke="#9b59b6" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- NÚT LÊN CAMP -->
  <rect x="310" y="618" width="280" height="48" rx="24" fill="#e74c3c"/>
  <text x="450" y="647" text-anchor="middle" fill="white" font-weight="700" font-size="15">🚀 Lên Campaign</text>

  <line x1="450" y1="790" x2="450" y2="820" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- META API -->
  <rect x="280" y="820" width="340" height="44" rx="8" fill="#fde8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="450" y="842" text-anchor="middle" fill="#c0392b" font-weight="600">⚙️ Gọi Meta Marketing API</text>
  <text x="450" y="857" text-anchor="middle" fill="#888" font-size="11">Tạo Campaign → AdSet → Ad</text>

  <line x1="450" y1="864" x2="450" y2="890" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RESULT -->
  <rect x="310" y="890" width="280" height="44" rx="8" fill="#e8f8f0" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="912" text-anchor="middle" fill="#1e8449" font-weight="600">✅ Campaign đã lên</text>
  <text x="450" y="927" text-anchor="middle" fill="#888" font-size="11">Trả về Campaign ID + link</text>

  <!-- LEGEND -->
  <rect x="30" y="950" width="840" height="130" rx="8" fill="white" stroke="#eee" stroke-width="1"/>
  <text x="450" y="972" text-anchor="middle" fill="#aaa" font-size="11" font-style="italic">— Ghi chú —</text>
  <rect x="50" y="985" width="12" height="12" rx="2" fill="#4a90d9"/>
  <text x="70" y="996" fill="#333" font-size="11">APP template: thông tin app store</text>
  <rect x="50" y="1007" width="12" height="12" rx="2" fill="#f5a623"/>
  <text x="70" y="1018" fill="#333" font-size="11">TARGET template: audience + budget</text>
  <rect x="50" y="1029" width="12" height="12" rx="2" fill="#27ae60"/>
  <text x="70" y="1040" fill="#333" font-size="11">AD template: copy + số lượng creative</text>
  <rect x="300" y="985" width="12" height="12" rx="2" fill="#9b59b6"/>
  <text x="320" y="996" fill="#333" font-size="11">PACKAGE: bundle 3 template trên</text>
  <text x="300" y="1018" fill="#555" font-size="11">💡 Mỗi template / package đều có thể:</text>
  <text x="300" y="1035" fill="#555" font-size="11">   → Chọn từ danh sách có sẵn (đã lưu trước)</text>
  <text x="300" y="1052" fill="#555" font-size="11">   → Tạo mới ngay trong cửa sổ lên camp rồi lưu lại</text>

  <text x="450" y="14" text-anchor="middle" fill="#aaa" font-size="10">FB Campaign Auto — Flow</text>
</svg>
